project:
  sourceknight: 0.3
  name: BossHP

  dependencies:
    - name: sourcemod
      type: tar
      version: 1.12.0-git7223
      location: https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git7223-linux.tar.gz
      unpack:
        - source: /addons
          dest: /addons

    - name: ext-outputinfo
      type: git
      repo: https://github.com/srcdslab/sm-ext-outputinfo
      unpack:
        - source: /package/addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: smlib
      type: git
      repo: https://github.com/srcdslab/sm-plugin-smlib
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: basic
      type: git
      repo: https://github.com/srcdslab/sm-plugin-basic
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: multicolors
      type: git
      repo: https://github.com/srcdslab/sm-plugin-MultiColors
      unpack:
        - source: /addons
          dest: /addons

  root: /
  output: /addons/sourcemod/plugins

  targets:
    - BossHP
